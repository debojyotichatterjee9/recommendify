# Restaurant / Food Delivery Business Configuration
# Products: menu items (meals, drinks, desserts)

algorithm: content   # menu is relatively small; content similarity works well
collab_weight: 0.3
content_weight: 0.7

interaction_scores:
  view: 0.5
  like: 2.0
  order: 5.0
  reorder: 7.0       # repeat orders signal strong preference
  rate: 3.0

content_fields:
  - name
  - description
  - product_type     # meal | drink | dessert | snack
  - cuisine
  - dietary_tags     # vegan, gluten-free, halal …
  - spice_level
